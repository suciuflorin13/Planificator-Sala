  <script>
    (async function resetLegacyFlutterCache() {
      try {
        // Versiunea actuală - ACTUALIZEAZĂ ACEASTA LA FIECARE DEPLOY
        const CACHE_VERSION = 'sw-cache-reset-v1.0.0';
        
        if (sessionStorage.getItem(CACHE_VERSION) == 'done') {
          return;
        }

        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        sessionStorage.setItem(CACHE_VERSION, 'done');

        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          window.location.reload();
        }
      } catch (_) {
        // Ignore and continue bootstrap.
      }
    })();
  </script>
